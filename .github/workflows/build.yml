name: Build Infinity X 3.10 for Realme 5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3 ccache openjdk-17-jdk
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure Git
        run: |
          git config --global user.name "srikrithik"
          git config --global user.email "your_email@gmail.com"

      - name: Sync Infinity X Source
        run: |
          mkdir workspace && cd workspace
          repo init -u https://github.com/projectinfinity-X/manifest.git -b 16 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Start Build
        run: |
          cd workspace
          source build/envsetup.sh
          lunch infinity_r5x-userdebug || lunch infinity_arm64-userdebug
          mka infinity -j$(nproc)

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: InfinityX-Build
          path: workspace/out/target/product/*/*.zip
